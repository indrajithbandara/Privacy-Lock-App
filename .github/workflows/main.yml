name: Android CI / CD Pipeline (Main)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build, Test & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref_name != 'main' }}

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper
          chmod +x gradlew

      - name: Prepare Signing and Secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Copy environment variables example to .env to satisfy build configuration
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

          # Decode the production Keystore if secrets are configured.
          # Otherwise, build a self-signed temporary keystore to ensure the release build succeeds.
          if [ ! -z "$KEYSTORE_BASE64" ] && [ ! -z "$STORE_PASSWORD" ] && [ ! -z "$KEY_PASSWORD" ]; then
            echo "Configuring secure production credentials from GitHub Secrets..."
            echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
            echo "STORE_PASSWORD=$STORE_PASSWORD" >> $GITHUB_ENV
            echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV
            echo "KEYSTORE_PATH=my-upload-key.jks" >> $GITHUB_ENV
          else
            echo "No custom release signing secrets found. Fabricating robust temporary self-signed keystore..."
            keytool -genkeypair -v \
              -keystore my-upload-key.jks \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "dummypassword" \
              -keypass "dummypassword" \
              -dname "CN=Dummy, OU=Dummy, O=Dummy, L=Dummy, S=Dummy, C=US"
            
            echo "STORE_PASSWORD=dummypassword" >> $GITHUB_ENV
            echo "KEY_PASSWORD=dummypassword" >> $GITHUB_ENV
            echo "KEYSTORE_PATH=my-upload-key.jks" >> $GITHUB_ENV
          fi

      - name: Run Android Lint & Unit Tests
        run: ./gradlew lintDebug testDebugUnitTest --no-daemon

      - name: Upload Test & Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: privacy-lock-reports
          path: |
            app/build/reports/
            app/build/test-results/
          retention-days: 7

      - name: Build Debug & Release Artifacts
        run: ./gradlew assembleDebug assembleRelease bundleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Draft / Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
