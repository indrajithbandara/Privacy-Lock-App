name: 'Dependency Review'

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v7

      - name: 'Dependency Review'
        uses: github/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: CC-BY-NC-4.0, GPL-3.0-only
